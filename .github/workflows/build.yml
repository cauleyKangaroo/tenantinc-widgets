name: Build dist for GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          WIDGET_BASE_URL: ${{ secrets.WIDGET_BASE_URL }}
          WIDGET_APP_ID: ${{ secrets.WIDGET_APP_ID }}
          WIDGET_API_KEY: ${{ secrets.WIDGET_API_KEY }}
          WIDGET_PROPERTY_ID: ${{ secrets.WIDGET_PROPERTY_ID }}
          WIDGET_SPACE_GROUP_ID: ${{ secrets.WIDGET_SPACE_GROUP_ID }}

      - name: Commit dist to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git diff --staged --quiet || git commit -m "build: rebuild dist [skip ci]"
          git push
